name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test & Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon --quiet

      - name: Run tests
        run: ./gradlew unitTest test --no-daemon

      - name: Upload coverage to Codecov
        if: always() && hashFiles('build/reports/jacoco/test/jacocoTestReport.xml') != ''
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          flags: codescape
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Show test failures
        if: failure()
        run: |
          python3 -c "
          import glob, xml.etree.ElementTree as ET
          for path in glob.glob('build/test-results/test/*.xml'):
              root = ET.parse(path).getroot()
              for tc in root.iter('testcase'):
                  for tag in ('failure', 'error'):
                      fail = tc.find(tag)
                      if fail is not None:
                          print('FAILED:', tc.get('classname') + '.' + tc.get('name'))
                          print((fail.get('message') or '') + chr(10) + (fail.text or '')[:3000])
          "

      - name: Create pluginVerifier cache directory
        run: mkdir -p ~/.pluginVerifier/extracted-plugins

      - name: Verify plugin (marketplace compatibility)
        run: ./gradlew verifyPlugin --no-daemon --quiet

      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: codescape-${{ github.event.pull_request.number || github.sha }}
          path: build/distributions/*.zip
          if-no-files-found: error
          retention-days: 7
