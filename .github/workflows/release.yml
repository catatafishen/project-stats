name: Release

on:
  push:
    branches: [ master ]

permissions: read-all

concurrency:
  # Only one release at a time. cancel-in-progress: false means a second push queues
  # rather than being dropped — when the queued run starts it sees all commits since
  # the tag the running job created.
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version, Tag & Build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then LATEST_TAG="v0.0.0"; fi
          echo "Latest tag: $LATEST_TAG"

          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE '^[a-z]+(\(.+\))?!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE 'BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → v${NEW_VERSION}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        run: |
          mkdir -p build
          # HTML for plugin.xml <change-notes>: all changes since marketplace-latest.
          bash scripts/generate-changelog.sh > build/changelog.html

          # Markdown for the GitHub release body: only changes in this release.
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          CHANGELOG_BASELINE="${LATEST_TAG:-}" CHANGELOG_FORMAT=md \
            bash scripts/generate-changelog.sh > build/this-release.md

          CHANGELOG_FORMAT=md bash scripts/generate-changelog.sh > build/since-marketplace.md

          {
            cat build/this-release.md
            echo ""
            if ! diff -q build/this-release.md build/since-marketplace.md >/dev/null 2>&1; then
              echo "---"
              echo ""
              echo "<details><summary>📦 All changes since last Marketplace publish</summary>"
              echo ""
              cat build/since-marketplace.md
              echo ""
              echo "</details>"
            fi
          } > build/release-notes.md

          echo "### 📋 Plugin changelog (HTML)" >> "$GITHUB_STEP_SUMMARY"
          echo '```html' >> "$GITHUB_STEP_SUMMARY"
          cat build/changelog.html >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "### 📝 Release notes" >> "$GITHUB_STEP_SUMMARY"
          cat build/release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build release ZIP
        if: steps.version.outputs.skip != 'true'
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG_FILE: build/changelog.html
        run: ./gradlew buildPlugin --no-daemon --quiet

      - name: Collect release artifacts
        if: steps.version.outputs.skip != 'true'
        id: artifacts
        run: |
          mkdir -p release-artifacts
          cp build/distributions/*.zip release-artifacts/
          echo "dir=release-artifacts" >> "$GITHUB_OUTPUT"
          ls -la release-artifacts/

      - name: Generate provenance attestation
        if: steps.version.outputs.skip != 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: '${{ steps.artifacts.outputs.dir }}/*.zip'

      - name: Install cosign
        if: steps.version.outputs.skip != 'true'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign release artifacts with cosign
        if: steps.version.outputs.skip != 'true'
        env:
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          for artifact in "$ARTIFACTS_DIR"/*.zip; do
            cosign sign-blob --yes \
              --bundle "${artifact}.sigstore.json" \
              "$artifact"
          done

      - name: Authenticate git for tag push
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth setup-git

      - name: Create tag and GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "Release $TAG" \
            --notes-file build/release-notes.md \
            "$ARTIFACTS_DIR"/*.zip \
            "$ARTIFACTS_DIR"/*.sigstore.json
